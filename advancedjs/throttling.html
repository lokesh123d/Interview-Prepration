<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text">
</body>
<script>
    const input = document.querySelector('input');

    input.addEventListener('input', throttle(yaheChalega, 1000))


    function yaheChalega() {
        console.log('hey');
    }


    function throttle(func, delay) {
        let timer = 0;
        return function (e) {
            let now = Date.now();
            if (now - timer >= delay) {
                timer = now;
                func(e);
            }

        }
    }
</script>

</html>
